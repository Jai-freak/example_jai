<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Robot Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif
        }
        
        body {
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }
        /* Floating Robot Button */
        
        .robot-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }
        
        .robot-btn:hover {
            transform: scale(1.1) rotate(10deg);
        }
        
        .robot-btn img {
            width: 40px;
        }
        /* Chat Window */
        
        .chat-container {
            position: fixed;
            bottom: 110px;
            right: 25px;
            width: 360px;
            height: 520px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.4s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0
            }
            to {
                transform: translateY(0);
                opacity: 1
            }
        }
        
        .chat-header {
            background: #2a5298;
            color: #fff;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header span {
            font-weight: bold;
        }
        
        .close-btn {
            cursor: pointer;
            font-size: 18px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14px;
            animation: fadeIn 0.3s;
        }
        
        .user {
            align-self: flex-end;
            background: #2a5298;
            color: #fff;
        }
        
        .bot {
            align-self: flex-start;
            background: #f1f1f1;
        }
        
        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }
        
        .chat-input input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }
        
        .chat-input button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            background: #2a5298;
            color: white;
            cursor: pointer;
        }
        
        .typing {
            font-size: 12px;
            color: gray;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>
</head>

<body>

    <!-- Robot Button -->
    <div class="robot-btn" onclick="toggleChat()">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="robot">
    </div>

    <!-- Chat Box -->
    <div class="chat-container" id="chatBox">
        <div class="chat-header">
            <span>🤖 AI Assistant</span>
            <div class="close-btn" onclick="toggleChat()">✖</div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messages = document.getElementById('chatMessages');

        function toggleChat() {
            chatBox.style.display = chatBox.style.display === 'flex' ? 'none' : 'flex';
        }

        function addMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = 'message ' + type;
            msg.innerText = text;
            messages.appendChild(msg);
            messages.scrollTop = messages.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            showTyping();

            setTimeout(() => {
                removeTyping();
                addMessage(generateReply(text), 'bot');
            }, 800);
        }

        function showTyping() {
            const t = document.createElement('div');
            t.id = 'typing';
            t.className = 'typing';
            t.innerText = 'Bot typing...';
            messages.appendChild(t);
        }

        function removeTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }

        function generateReply(input) {
            input = input.toLowerCase();

            if (input.includes('hello')) return 'Hello 👋 How can I help?';
            if (input.includes('cyber')) return 'Cybersecurity protects systems from attacks 🔐';
            if (input.includes('project')) return 'I can help build cool projects 🚀';
            if (input.includes('hack')) return 'Ethical hacking helps secure systems 🛡️';

            const replies = [
                'Interesting 🤔',
                'Tell me more...',
                'I am thinking...',
                'Nice question!',
                'Try asking something else 😊'
            ];

            return replies[Math.floor(Math.random() * replies.length)];
        }

        // Enter key

        document.getElementById('userInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        // Welcome message
        setTimeout(() => {
            addMessage('Hi 👋 Click the robot anytime to chat!', 'bot');
        }, 500);
    </script>

</body>

</html>
